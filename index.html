<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mulheres que Voam — Eventos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --olive-deep:#5c6146;
    --olive:#838762;
    --olive-soft:#a7ab8c;
    --sage:#6fa876;
    --sage-dark:#4f8759;
    --cream:#f7f5ee;
    --cream-dim:#ece6d5;
    --ink:#3a3c2c;
    --gold:#c79a56;
    --rose:#a85c48;
    --rose-dark:#8c4634;
    --line:rgba(92,97,70,0.16);
    --shadow:0 6px 20px rgba(63,66,44,0.10);
    --radius:14px;
  }
  html, body { margin:0; background:var(--cream); font-family:'Inter', sans-serif; color:var(--ink); }
  .display { font-family:'Josefin Sans', sans-serif; }
  #root:empty::before { content:'Carregando catálogo...'; color:var(--olive); display:block; padding:40px; }

  .card {
    position:relative;
    background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
    overflow:hidden;
  }
  .card::before, .card::after {
    content:''; position:absolute; width:22px; height:22px; background:var(--cream);
    border-radius:50%; top:50%; transform:translateY(-50%); z-index:2;
  }
  .card::before { left:-11px; }
  .card::after { right:-11px; }
  .card.is-finalizado { filter:grayscale(1); }
  .ribbon {
    position:absolute; top:16px; left:-34px; width:160px; text-align:center;
    background:var(--rose-dark); color:#fff; font-size:.68rem; font-weight:700;
    letter-spacing:.06em; text-transform:uppercase; padding:5px 0; transform:rotate(-40deg);
    box-shadow:0 2px 6px rgba(0,0,0,.25); z-index:3;
  }
  .card-img { width:150px; flex-shrink:0; object-fit:cover; display:block; background:var(--cream-dim); }
  .card-img-placeholder {
    width:150px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:var(--cream-dim);
  }
  .perf { width:4px; flex-shrink:0; background-image: radial-gradient(circle, var(--line) 1.5px, transparent 1.5px); background-size:8px 8px; }
  .btn-primary { background:var(--olive-deep); color:var(--cream); transition:transform .15s ease, background .15s ease; }
  .btn-primary:hover { background:var(--olive); transform:translateY(-1px); }
  .btn-primary:active { transform:translateY(0); }
  .btn-disabled { background:var(--olive-soft); color:var(--cream); cursor:default; }
  .btn-outline { border:1px solid var(--line); color:var(--olive-deep); background:transparent; }
  .btn-outline:hover { background:var(--cream-dim); border-color:var(--olive-soft); }
  .btn-instagram {
    background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7); color:#fff;
    transition:transform .15s ease, filter .15s ease;
  }
  .btn-instagram:hover { filter:brightness(1.08); transform:translateY(-1px); }
  .input-field { border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:.9rem; width:100%; }
  .input-field:focus { outline:2px solid var(--gold); outline-offset:1px; }
  .modal-enter { animation: modalIn .18s ease-out; }
  @keyframes modalIn { from { opacity:0; transform: scale(.97); } to { opacity:1; transform: scale(1); } }
  @media(max-width:520px){
    .card { flex-direction:column; }
    .card-img, .card-img-placeholder { width:100%; height:140px; }
    .perf { width:100%; height:4px; background-size:8px 8px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
window.addEventListener('error', function (e) {
  var root = document.getElementById('root');
  root.innerHTML = '<div style="color:#3a3c2c;background:#f7f5ee;font-family:sans-serif;padding:24px;white-space:pre-wrap;">⚠ Erro ao carregar:\n\n' + (e.message || e) + '</div>';
});
</script>

const ORDER_MARKER = '#PEDIDO-INGRESSO#';

const root = document.getElementById('root');
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function fmtBRL(v) { return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
function fmtDate(dataISO, hora) {
  const d = new Date(dataISO + 'T' + (hora || '00:00'));
  return d.toLocaleDateString('pt-BR') + ' às ' + (hora || '').slice(0,5);
}

function buildOrderMessage(ev, paymentMethod, nomeCompleto) {
  return [
    ORDER_MARKER,
    `Nome: ${nomeCompleto}`,
    `Evento: ${ev.nome}`,
    `Data: ${fmtDate(ev.data, ev.hora)}`,
    `Valor: ${fmtBRL(ev.preco)}`,
    `Pagamento: ${paymentMethod}`,
  ].join('\n');
}
function openWhatsApp(ev, paymentMethod, nomeCompleto) {
  const msg = buildOrderMessage(ev, paymentMethod, nomeCompleto);
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

async function registrarMulher(nomeCompleto, telCliente) {
  const { error } = await supabase.from('mv_mulheres').insert({ nome: nomeCompleto, tel: telCliente });
  if (error && error.code !== '23505') {
    console.error('Erro ao cadastrar mulher:', error);
  }
}

function isNomeValido(v) { return v.trim().split(/\s+/).length >= 2; }
function isTelValido(v) { return v.replace(/\D/g, '').length >= 10; }

let state = { events: [], loading: true, modalEvent: null, modalError: '', progEvent: null, progItens: [], progLoading: false };

async function loadEvents() {
  const { data, error } = await supabase.from('mv_eventos').select('*');
  if (error) { console.error(error); return []; }
  const abertos = data.filter(e => e.status === 'aberto').sort((a,b) => a.data.localeCompare(b.data));
  const finalizados = data.filter(e => e.status !== 'aberto').sort((a,b) => b.data.localeCompare(a.data));
  return abertos.concat(finalizados);
}

function render() {
  root.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'min-h-screen px-4 py-10 md:py-16';
  wrap.innerHTML = `
    <div class="max-w-3xl mx-auto">
      <div class="flex items-center justify-between gap-4 mb-12 flex-wrap">
        <div class="flex items-center gap-4">
          <img src="data:image/png;base64,${LOGO_ICON_B64}" alt="" style="width:96px;height:auto;flex-shrink:0;">
          <div class="display leading-tight" style="color:var(--olive-deep);">
            <div style="font-size:2.1rem;font-weight:400;">mulheres</div>
            <div style="font-size:2.1rem;font-weight:400;margin-top:-8px;">que voam</div>
          </div>
        </div>
        <a href="https://www.instagram.com/mulheresquevoam1?igsh=ZG5uem9uZXAxemEy" target="_blank" rel="noopener"
           class="btn-instagram px-4 py-2.5 rounded-lg font-semibold text-sm flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          Seguir no Instagram
        </a>
      </div>
      <div class="mb-8">
        <div style="color:var(--olive);font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;margin-bottom:6px;">Eventos</div>
        <h1 class="display" style="color:var(--ink);font-size:2rem;font-weight:500;">Ingressos disponíveis</h1>
      </div>
      <div id="list" class="space-y-6"></div>
    </div>
  `;
  root.appendChild(wrap);

  const list = wrap.querySelector('#list');
  if (state.loading) {
    list.innerHTML = `<div style="color:var(--olive);">Carregando eventos...</div>`;
  } else {
    if (state.events.length === 0) {
      list.innerHTML = `<div class="card p-8 text-center" style="color:var(--olive);">Nenhum evento à venda no momento.</div>`;
    }
    state.events.forEach(ev => {
      const finalizado = ev.status !== 'aberto';
      const card = document.createElement('div');
      card.className = 'card flex' + (finalizado ? ' is-finalizado' : '');
      const imgHtml = ev.imagem_url
        ? `<img src="${ev.imagem_url}" class="card-img" alt="${ev.nome}">`
        : `<div class="card-img-placeholder"><img src="data:image/png;base64,${LOGO_ICON_B64}" style="width:60px;opacity:.35;"></div>`;
      const ribbonHtml = finalizado ? `<div class="ribbon">Evento encerrado</div>` : '';
      const buyBtnHtml = finalizado
        ? `<button class="btn-disabled px-5 py-2.5 rounded-lg font-semibold text-sm" disabled>Encerrado</button>`
        : `<button data-id="${ev.id}" class="buy-btn btn-primary px-5 py-2.5 rounded-lg font-semibold text-sm">Comprar ingresso</button>`;
      card.innerHTML = `
        ${ribbonHtml}
        ${imgHtml}
        <div class="perf"></div>
        <div class="p-5 flex-1">
          <div class="display" style="font-size:1.25rem;font-weight:500;color:var(--ink);">${ev.nome}</div>
          <div style="color:var(--olive);font-size:.85rem;margin-top:2px;">${fmtDate(ev.data, ev.hora)}</div>
          <button data-prog-id="${ev.id}" class="prog-btn text-xs mt-2 underline decoration-dotted" style="color:var(--olive);">Ver programação</button>
          <div class="flex items-center justify-between mt-4">
            <div class="font-bold" style="color:var(--sage-dark);font-size:1.15rem;">${fmtBRL(ev.preco)}</div>
            ${buyBtnHtml}
          </div>
        </div>
      `;
      list.appendChild(card);
    });
    list.querySelectorAll('.buy-btn').forEach(btn => {
      btn.addEventListener('click', () => { state.modalEvent = state.events.find(e => e.id === btn.dataset.id); render(); });
    });
    list.querySelectorAll('.prog-btn').forEach(btn => {
      btn.addEventListener('click', () => abrirProgramacao(state.events.find(e => e.id === btn.dataset.progId)));
    });
  }

  if (state.modalEvent) renderModal(wrap);
  if (state.progEvent) renderProgramacaoModal(wrap);
}

async function abrirProgramacao(ev) {
  state.progEvent = ev;
  state.progLoading = true;
  state.progItens = [];
  render();
  const { data, error } = await supabase.from('mv_programacao').select('*').eq('evento_id', ev.id).order('horario', { ascending: true });
  state.progLoading = false;
  state.progItens = error ? [] : data;
  render();
}

function renderProgramacaoModal(wrap) {
  const ev = state.progEvent;
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 flex items-center justify-center p-4 z-50';
  overlay.style.background = 'rgba(58,60,44,0.55)';
  const itensHtml = state.progLoading
    ? `<div style="color:var(--olive);font-size:.9rem;">Carregando...</div>`
    : (state.progItens.length === 0
        ? `<div style="color:var(--olive);font-size:.9rem;">Programação ainda não divulgada para este evento.</div>`
        : state.progItens.map(p => `
            <div class="flex gap-3 py-2" style="border-bottom:1px solid var(--line);">
              <div class="font-bold text-sm w-14 shrink-0" style="color:var(--sage-dark);">${(p.horario||'').slice(0,5)}</div>
              <div class="text-sm" style="color:var(--ink);">${p.atividade}</div>
            </div>`).join(''));
  overlay.innerHTML = `
    <div class="modal-enter card p-6 max-w-sm w-full">
      <div class="display" style="font-size:1.15rem;font-weight:500;color:var(--ink);">${ev.nome}</div>
      <div style="color:var(--olive);font-size:.85rem;margin-bottom:14px;">${fmtDate(ev.data, ev.hora)}</div>
      <div class="mb-4">${itensHtml}</div>
      <button id="close-prog-modal" class="text-xs underline" style="color:var(--olive);">fechar</button>
    </div>`;
  wrap.appendChild(overlay);
  overlay.querySelector('#close-prog-modal').addEventListener('click', () => { state.progEvent = null; render(); });
}

function renderModal(wrap) {
  const ev = state.modalEvent;
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 flex items-center justify-center p-4 z-50';
  overlay.style.background = 'rgba(58,60,44,0.55)';
